<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULZO - Concepto y Arte Digital</title>
    <link rel="stylesheet" href="styles.css">
    
    <link rel="stylesheet" href="https://use.typekit.net/kub5fxs.css">
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <link rel="icon" type="image/png" href="Images/favicon.png">
</head>
<body>

<section id="suscripcion">
    <div class="sparkles-layer">
        <span class="sparkle s1"></span>
        <span class="sparkle s2"></span>
        <span class="sparkle s3"></span>
        <span class="sparkle s4"></span>
        <span class="sparkle s5"></span>
        <span class="sparkle s6"></span>
        <span class="sparkle s7"></span>
    </div>
    <div class="glass-card">
        <div class="card-header">
            <span class="left-text">Crear</span>
            <span class="right-text">Llena de vida</span>
        </div>
        
        <h2>Quiero mostrarte todo ya</h2>
        
        <div id="mc_embed_signup">
            <form action="https://site.us10.list-manage.com/subscribe/post?u=92a1478b9f7de244936eafe18&amp;id=9b64463703&amp;f_id=000d4fe4f0" method="post" id="mc-embedded-subscribe-form" name="mc-embedded-subscribe-form" target="_blank">
                
                <div class="mc-field-group">
                    <label for="mce-FNAME">Nombre</label>
                    <input type="text" name="FNAME" id="mce-FNAME" placeholder="Tu nombre">
                </div>

                <div class="mc-field-group">
                    <label for="mce-EMAIL">Correo electrónico <span style="color:red">*</span></label>
                    <input type="email" name="EMAIL" id="mce-EMAIL" required placeholder="tu@email.com">
                </div>

                <div class="optionalParent">
                    <input type="submit" name="subscribe" id="mc-embedded-subscribe" class="button" value="Suscribirme">
                </div>

                <div aria-hidden="true" style="position: absolute; left: -5000px;">
                    <input type="text" name="b_92a1478b9f7de244936eafe18_9b64463703" tabindex="-1" value="">
                </div>
            </form>
        </div>
        
        <div class="card-footer">
            @Pulzo.studio
        </div>
    </div>
</section>

</body>
</html>
