<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="Images/favicon.png">

<body>

<section id="suscripcion">
    <div class="sparkles-layer">
        <span class="sparkle s1"></span>
        <span class="sparkle s2"></span>
        <span class="sparkle s3"></span>
        <span class="sparkle s4"></span>
        <span class="sparkle s5"></span>
        <span class="sparkle s6"></span>
        <span class="sparkle s7"></span>
    </div>
    <div class="glass-card">
        <div class="card-header">
            <span class="left-text">Crear</span>
            <span class="right-text">Llena de vida</span>
        </div>
        
        <h2>Quiero mostrarte todo ya</h2>
        
        <div id="mc_embed_signup">
            <form id="customForm">
                
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="name" placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label>Correo electrónico <span style="color:red">*</span></label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>

                <button type="submit">Suscribirme</button>
            </form>
            <div style="display:none;">
                <div class="ml-embedded" data-form="G1YqfQ"></div>
            </div>
        </div>
        
        <div class="card-footer">
            @Pulzo.studio
        </div>
    </div>
</section>
