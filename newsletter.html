<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULZO - Concepto y Arte Digital</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/kub5fxs.css">
    
    <script>
        (function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[])
        .push(arguments);},l=d.createElement(e),l.async=1,l.src=u,
        n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})
        (window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
        ml('account', '2212803');
    </script>
    <link rel="icon" type="image/png" href="Images/favicon.png">
</head>
<body>

<section id="suscripcion">
    <div class="sparkles-layer">
        <span class="sparkle s1"></span>
        <span class="sparkle s2"></span>
        <span class="sparkle s3"></span>
        <span class="sparkle s4"></span>
        <span class="sparkle s5"></span>
        <span class="sparkle s6"></span>
        <span class="sparkle s7"></span>
    </div>
    <div class="glass-card">
        <div class="card-header">
            <span class="left-text">Crear</span>
            <span class="right-text">Llena de vida</span>
        </div>
        
        <div id="form-content">
            <h2>Quiero mostrarte todo ya</h2>
            
            <div id="mlb2-38824510" class="ml-form-embedContainer">
                <form action="https://assets.mailerlite.com/jsonp/2212803/forms/38824510/subscribe" 
                      method="post" 
                      class="ml-block-form"
                      id="pulzo-form">
                    
                    <div class="mc-field-group">
                        <label for="fields[name]">Nombre</label>
                        <input type="text" name="fields[name]" id="fields[name]" placeholder="Tu nombre">
                    </div>

                    <div class="mc-field-group">
                        <label for="fields[email]">Correo electrónico <span style="color:red">*</span></label>
                        <input type="email" name="fields[email]" id="fields[email]" required placeholder="tu@email.com">
                    </div>

                    <input type="hidden" name="ml-submit" value="1">
                    <input type="hidden" name="anticsrf" value="true">

                    <div class="optionalParent">
                        <input type="submit" class="button" value="Suscribirme">
                    </div>
                </form>
            </div>
        </div>
        
        <div class="card-footer">
            @Pulzo.studio
        </div>
    </div>
</section>

<script>
    const form = document.getElementById('pulzo-form');
    const formContainer = document.getElementById('form-content');

    form.addEventListener('submit', function(e) {
        // No prevenimos el default para que MailerLite reciba los datos, 
        // pero usamos un pequeño delay para cambiar la interfaz antes del salto
        setTimeout(() => {
            formContainer.innerHTML = `
                <h2 style="margin-top: 20px;">¡Ya estás dentro!</h2>
                <p style="font-size: 14px; opacity: 0.8;">Revisá tu mail para empezar la experiencia Pulzo.</p>
                <div style="font-size: 40px; margin-top: 20px;">✨</div>
            `;
        }, 100);
    });
</script>

</body>
</html>
